name: Frontend Deployment On Push
on: 
    push:
        branches:
            - main

jobs:
    testing:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
            - name: Set up Node.js
              uses: actions/setup-node@v6
            - name: Install Dependencies
              run: npm ci
              working-directory: ./home/runner/work/gh-workflows-and-actions/gh-workflows-and-actions/02 Starting Project
            - name: Testing
              run: npm test
              working-directory: ./home/runner/work/gh-workflows-and-actions/gh-workflows-and-actions/02 Starting Project

        